<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập trình web - Đăng nhập</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .browser-container {
            width: 100%;
            max-width: 800px;
            background-color: white;
            border: 1px solid #ccc;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        /* Header & Nav */
        header {
            border-bottom: 1px solid #000;
            padding: 10px;
            text-align: center;
            margin: 20px 40px;
        }

        nav a {
            text-decoration: none;
            color: black;
            margin: 0 5px;
        }

        nav a.active {
            font-weight: bold;
        }

        /* Main Login Card */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-card {
            border: 1px solid #999;
            padding: 40px;
            width: 450px;
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: normal;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-group label {
            width: 100px;
            text-align: left;
        }

        .input-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #000;
        }

        .options {
            text-align: left;
            margin-left: 100px;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-left: 100px;
        }

        .forgot-password {
            color: #4a90e2;
            text-decoration: none;
            font-size: 0.9em;
        }

        .btn-login {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Footer */
        footer {
            border-top: 1px solid #000;
            padding: 10px;
            text-align: center;
            margin: 20px 40px;
        }
    </style>

    <div class="browser-container">
        <header>
            <nav>
                <a href="#">Home</a> |
                <a href="#" class="active">Đăng nhập</a> |
                <a href="#">Đăng ký</a>
            </nav>
        </header>

        <main>
            <div class="login-card">
                <h2>Màn hình đăng nhập</h2>

                <form>
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username">
                    </div>

                    <div class="input-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password">
                    </div>

                    <div class="options">
                        <label class="remember-me">
                            <input type="checkbox" checked> Ghi nhớ đăng nhập
                        </label>
                    </div>

                    <div class="actions">
                        <a href="#" class="forgot-password">Quên mật khẩu</a>
                        <button type="submit" class="btn-login">Đăng nhập</button>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            Lập trình web @01/2024
        </footer>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập trình web - Đăng ký</title>
    <style>
        /* Cài đặt chung */
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Khung trình duyệt giả lập */
        .browser-window {
            width: 100%;
            max-width: 900px;
            background-color: #fff;
            border: 1px solid #999;
            min-height: 650px;
            display: flex;
            flex-direction: column;
        }

        /* Thanh điều hướng Header */
        .header-nav {
            border: 1px solid #000;
            margin: 20px 40px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }

        .header-nav a {
            text-decoration: none;
            color: #000;
            margin: 0 5px;
        }

        .header-nav a.active {
            font-weight: bold;
        }

        /* Vùng chứa Form chính */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        /* Khung đăng ký */
        .register-box {
            border: 1px solid #999;
            padding: 40px 50px;
            width: 480px;
            text-align: center;
        }

        .register-box h2 {
            margin-bottom: 35px;
            font-weight: normal;
            font-size: 22px;
        }

        /* Hàng nhập liệu (Label + Input) */
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }

        .form-row label {
            width: 120px;
            /* Độ rộng nhãn lớn hơn một chút để chứa chữ dài */
            text-align: left;
            font-size: 14px;
            line-height: 1.2;
        }

        .form-row input {
            flex: 1;
            padding: 7px;
            border: 1px solid #000;
            outline: none;
        }

        /* Hàng nút bấm và link điều hướng */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 30px;
            margin-left: 120px;
            /* Thụt lề bằng chiều rộng label */
        }

        .login-link {
            color: #4a90e2;
            text-decoration: none;
            font-size: 13px;
            margin-right: 20px;
        }

        .btn-register {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-register:hover {
            background-color: #004494;
        }

        /* Chân trang Footer */
        .footer-bar {
            border: 1px solid #000;
            margin: 20px 40px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="browser-window">
        <div class="header-nav">
            <a href="#">Home</a> |
            <a href="#">Đăng nhập</a> |
            <a href="#" class="active">Đăng ký</a>
        </div>

        <div class="main-content">
            <div class="register-box">
                <h2>Màn hình đăng ký</h2>

                <form action="#">
                    <div class="form-row">
                        <label for="user">Username</label>
                        <input type="text" id="user" name="username">
                    </div>

                    <div class="form-row">
                        <label for="pass">Mật khẩu</label>
                        <input type="password" id="pass" name="password">
                    </div>

                    <div class="form-row">
                        <label for="re-pass">Nhập lại mật khẩu</label>
                        <input type="password" id="re-pass" name="re-password">
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="form-actions">
                        <a href="#" class="login-link">Đã có tài khoản</a>
                        <button type="submit" class="btn-register">Đăng ký</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="footer-bar">
            Lập trình web @01/2024
        </div>
    </div>

</body>

</html>

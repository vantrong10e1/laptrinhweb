<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập trình web - Chi tiết</title>
    <style>
        /* Cấu trúc nền tảng */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Khung trình duyệt */
        .container {
            width: 800px;
            background-color: white;
            border: 1px solid #aaa;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Thanh tiêu đề trình duyệt */
        .header-top {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .url-bar {
            border: 1px solid #ddd;
            padding: 5px 15px;
            font-size: 14px;
            color: #444;
            margin-top: 8px;
        }

        /* Nội dung chính */
        .content {
            padding: 30px;
            text-align: center;
        }

        /* Menu điều hướng */
        .nav-bar {
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 40px;
        }

        .nav-bar a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        /* Khung hiển thị chi tiết */
        .detail-card {
            border: 1px solid #333;
            width: 450px;
            margin: 0 auto;
            padding: 40px 30px;
            text-align: left;
            position: relative;
        }

        .detail-card h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: normal;
            font-size: 22px;
        }

        .info-row {
            display: flex;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .label {
            width: 100px;
            font-weight: normal;
        }

        .value {
            font-weight: bold;
        }

        /* Nút Chỉnh sửa */
        .btn-edit {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
            margin-top: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-edit:hover {
            background-color: #004494;
        }

        /* Footer */
        .footer {
            border: 1px solid #333;
            padding: 10px;
            margin-top: 40px;
            font-size: 13px;
            clear: both;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-top">
            <div style="font-size: 13px;">📄 Lập trình web</div>
            <div class="url-bar">http://php.local</div>
        </div>

        <div class="content">
            <div class="nav-bar">
                <a href="#">Home</a> | <a href="#">Đăng xuất</a>
            </div>

            <div class="detail-card">
                <h2>Màn hình chi tiết</h2>

                <div class="info-row">
                    <span class="label">Username</span>
                    <span class="value">test1</span>
                </div>

                <div class="info-row">
                    <span class="label">Email</span>
                    <span class="value">test1@gmail.com</span>
                </div>

                <a href="#" class="btn-edit">Chỉnh sửa</a>
                <div style="clear: both;"></div>
            </div>

            <div class="footer">
                Lập trình web @01/2024
            </div>
        </div>
    </div>

</body>

</html>
